<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Mercadoria</title>
    <link rel="stylesheet" href="assets/styles/gerenciar.css">
    <script src="scripts/app-gerenciar-mercadoria.js" defer></script>
    <link rel="shortcut icon" href="assets/icons/favicon.ico" type="image/x-icon">
</head>

<body>
    <header>
        <img src="assets/images/logo-horizontal.png" alt="Logo da Concessionária Turing">
    </header>

    <section class="navigation">
        <div class="search">
            <input type="text" id="searchInput" placeholder="Pesquisar por Item ou Código">
            <button type="submit" id="searchBtn"><img src="assets/images/lupa.png" alt="Buscar"></button>
        </div>
        <div class="actions">
            <button id="editBtn" disabled>EDITAR MERCADORIA</button>
            <button id="deleteBtn" disabled>EXCLUIR MERCADORIA</button>
            <a href="cadastrar-mercadoria.html">NOVA MERCADORIA</a>
        </div>
    </section>

    <div class="table-container">
        <table id="mercadoriasTable">
            <thead>
                <tr>
                    <th>CÓDIGO</th>
                    <th>ITEM</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <footer>
        <a href="menu.html">MENU INICIAL</a>
        <button onclick="window.location.href='login.html'">LOGOUT</button>
    </footer>
</body>

</html>
