<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Veículo</title>
    <link rel="stylesheet" href="assets/styles/cadastro.css">
    <link rel="shortcut icon" href="assets/icons/favicon.ico" type="image/x-icon">
</head>
<body>
    <main>
        <section class="form-container">
            <h1>EDITAR VEÍCULO</h1>
            <form>
                <fieldset>
                    <legend>Dados do Veículo</legend>

                    <div class="form-group">
                        <label for="chassi">CHASSI: <span class="required">*</span></label>
                        <input type="text" id="chassi" name="chassi" required readonly>
                    </div>

                    <div class="form-group">
                        <label for="cor">COR: <span class="required">*</span></label>
                        <input type="text" id="cor" name="cor" required>
                    </div>

                    <div class="form-group">
                        <label for="ano">ANO: <span class="required">*</span></label>
                        <input type="number" id="ano" name="ano" required>
                    </div>

                    <div class="form-group">
                        <label for="modelo">MODELO:</label>
                        <select id="modelo" name="modelo" required>
                            <option value="Pop 110">POP 110</option>
                            <option value="Biz 125">BIZ 125</option>
                            <option value="CG 160">CG 160</option>
                            <option value="XRE 200">XRE 200</option>
                            <option value="CB 300">CB 300</option>
                        </select>
                    </div>
                </fieldset>

                <div class="form-actions">
                    <button type="reset" class="btn-cancel">CANCELAR AÇÃO</button>
                    <button type="submit" class="btn-save">SALVAR</button>
                </div>
            </form>
        </section>
    </main>
    <script src="./scripts/app-edit-veiculo.js" defer></script>
</body>
</html>
