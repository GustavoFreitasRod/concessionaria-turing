<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Vendas</title>
    <link rel="stylesheet" href="assets/styles/gerenciar.css">
    <script src="scripts/app-gerenciar-venda.js" defer></script>
    <link rel="shortcut icon" href="assets/icons/favicon.ico" type="image/x-icon">
</head>
<body>
    <header>
        <img src="assets/images/logo-horizontal.png" alt="Logo da Concessionária Turing">
    </header>

    <section class="navigation">
        <div class="search">
            <input type="text" id="campoBusca" placeholder="Pesquisar por Cliente, Data ou Mercadoria">
            <button type="submit" id="searchBtn"><img src="assets/images/lupa.png" alt="Buscar"></button>
        </div>

        <div class="actions">
            <button id="editBtn" disabled>EDITAR VENDA</button>
            <button id="deleteBtn" disabled>EXCLUIR VENDA</button>
            <a href="cadastrar-venda.html">NOVA VENDA</a>
        </div>
    </section>

    <div class="table-container">
        <table id="tabela-vendas">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>CLIENTE</th>
                    <th>DATA</th>
                    <th>MERCADORIA/VEÍCULO</th>
                    <th>QUANTIDADE</th>
                    <th>VALOR</th>
                </tr>
            </thead>

            <tbody id="tbody-vendas"></tbody>
        </table>
    </div>

    <footer>
        <a href="menu.html">MENU INICIAL</a>
        <button onclick="window.location.href='login.html'">LOGOUT</button>
    </footer>
</body>
</html>
