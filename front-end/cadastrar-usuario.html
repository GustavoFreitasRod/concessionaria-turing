
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Usuário</title>
    <link rel="stylesheet" href="assets/styles/cadastro.css">
    <link rel="shortcut icon" href="assets/icons/favicon.ico" type="image/x-icon">
</head>
<body>
    <main>
        <section class="form-container">
            <h1>NOVO USUÁRIO</h1>
            <form id="formUsuario" onsubmit="return validarSenha()">
                <fieldset>
                    <legend>Dados do Usuário</legend>
                    <div class="form-group">
                        <label for="nome">NOME: <span class="required">*</span></label>
                        <input type="text" id="nome" name="nome" required>
                    </div>

                    <div class="form-group">
                        <label for="email">E-MAIL <span class="required">*</span></label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="senha">SENHA <span class="required">*</span></label>
                        <input type="password" id="senha" name="senha" required>
                    </div>

                    <div class="form-group">
                        <label for="confirmar_senha">CONFIRMAR SENHA <span class="required">*</span></label>
                        <input type="password" id="confirmar_senha" name="confirmar_senha" required>
                    </div>
                </fieldset>

                <div class="form-actions">
                    <button type="reset" class="btn-cancel">CANCELAR AÇÃO</button>
                    <button type="submit" class="btn-save">SALVAR</button>
                </div>
            </form>
        </section>
    </main>

    <script src="./scripts/app-usuario.js" defer></script>
</body>
</html>
