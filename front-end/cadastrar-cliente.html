<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Cliente</title>
    <link rel="stylesheet" href="assets/styles/cadastro.css">
    <script src="./scripts/app-cliente.js" defer></script>
    <link rel="shortcut icon" href="assets/icons/favicon.ico" type="image/x-icon">
</head>

<body>
    <main>
        <section class="form-container">
            <h1>NOVO CLIENTE</h1>
            <form>
                <fieldset>
                    <legend>Dados do Cliente</legend>

                    <div class="form-group">
                        <label>TIPO DE PESSOA: <span class="required">*</span></label>

                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="radio" name="tipoPessoa" value="pf" id="tipoPF" checked>
                                <span>Pessoa Física</span>
                            </label>

                            <label class="radio-option">
                                <input type="radio" name="tipoPessoa" value="pj" id="tipoPJ">
                                <span>Pessoa Jurídica</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="nome">NOME: <span class="required">*</span></label>
                        <input type="text" id="nome" name="nome" required>
                    </div>

                    <div class="form-group">
                        <label for="cpf_cnpj" id="labelDocumento">CPF: <span class="required">*</span></label>
                        <input type="text" id="cpf_cnpj" name="cpf_cnpj" placeholder="000.000.000-00" required>
                    </div>

                    <div class="form-group">
                        <label for="telefone">TELEFONE: <span class="required">*</span></label>
                        <input type="tel" id="telefone" name="telefone" required>
                    </div>

                    <div class="form-group">
                        <label for="email">E-MAIL:</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-inline">
                        <label for="cep">CEP:</label>
                        <input type="text" id="cep" name="cep">
                        <label for="rua">RUA:</label>
                        <input type="text" id="rua" name="rua">
                    </div>

                    <div class="form-inline">
                        <label for="numero">NÚMERO:</label>
                        <input type="text" id="numero" name="numero">
                        <label for="complemento">COMPLEMENTO:</label>
                        <input type="text" id="complemento" name="complemento">
                    </div>

                    <div class="form-group">
                        <label for="bairro">BAIRRO:</label>
                        <input type="text" id="bairro" name="bairro">
                    </div>

                    <div class="form-inline">
                        <label for="cidade">CIDADE:</label>
                        <input type="text" id="cidade" name="cidade">
                        <label for="uf">UF:</label>
                        <select id="uf" name="uf" required>
                            <option value="AC">Acre</option>
                            <option value="AL">Alagoas</option>
                            <option value="AP">Amapa</option>
                            <option value="AM">Amazonas</option>
                            <option value="BA">Bahia</option>
                            <option value="CE">Ceará</option>
                            <option value="DF">Distrito Federal</option>
                            <option value="ES">Espírito Santo</option>
                            <option value="GO">Goiás</option>
                            <option value="MA">Maranhão</option>
                            <option value="MT">Mato Grosso</option>
                            <option value="MS">Mato Grosso do Sul</option>
                            <option value="MG">Minas Gerais</option>
                            <option value="PA">Pará</option>
                            <option value="PB">Paraíba</option>
                            <option value="PR">Parana</option>
                            <option value="PE">Pernambuco</option>
                            <option value="PI">Piauí</option>
                            <option value="RJ">Rio de Janeiro</option>
                            <option value="RN">Rio Grande do Norte</option>
                            <option value="RS">Rio Grande do Sul</option>
                            <option value="RO">Rondônia</option>
                            <option value="RR">Roraima</option>
                            <option value="SC">Santa Catarina</option>
                            <option value="SP">São Paulo</option>
                            <option value="SE">Sergipe</option>
                            <option value="TO">Tocantins</option>
                        </select>
                    </div>
                </fieldset>

                <div class="form-actions">
                    <button type="reset" class="btn-cancel">CANCELAR AÇÃO</button>
                    <button type="submit" class="btn-save">SALVAR</button>
                </div>
            </form>
        </section>
    </main>

</body>

</html>
