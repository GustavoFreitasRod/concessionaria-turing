<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Usuário</title>
    <link rel="stylesheet" href="assets/styles/gerenciar.css">
    <link rel="stylesheet" href="assets/styles/modal-confirmacao.css">
    <script src="scripts/app-gerenciar-usuario.js" defer></script>
    <link rel="shortcut icon" href="assets/icons/favicon.ico" type="image/x-icon">
</head>

<body>
    <header>
        <img src="assets/images/logo-horizontal.png" alt="Logo da Concessionária Turing">
    </header>

    <section class="navigation">
        <div class="search">
            <input type="text" id="searchInput" placeholder="Pesquisar por Nome, ID ou E-mail">
            <button type="submit" id="searchBtn"><img src="assets/images/lupa.png" alt="Buscar"></button>
        </div>
        <div class="actions">
            <button id="editBtn" disabled>EDITAR USUÁRIO</button>
            <button id="deleteBtn" disabled>EXCLUIR USUÁRIO</button>
            <a href="cadastrar-usuario.html">NOVO USUÁRIO</a>
        </div>
    </section>

    <div class="table-container">
        <table id="usuariosTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>NOME</th>
                    <th>E-MAIL</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <footer>
        <a href="menu.html">MENU INICIAL</a>
        <button onclick="window.location.href='login.html'">LOGOUT</button>
    </footer>

    <div id="confirmacaoModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-icon">!</span>
                <span>Confirmar exclusão</span>
            </div>
            <p id="confirmacaoMensagem" class="modal-message"></p>
            <div class="modal-buttons">
                <button id="confirmacaoCancelar" class="modal-btn modal-btn-cancel">Cancelar</button>
                <button id="confirmacaoConfirmar" class="modal-btn modal-btn-confirm">Excluir</button>
            </div>
        </div>
    </div>

</body>

</html>
